<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- SEO -->
    <meta name="description" content="FlowSync AI — Real-time predictive crowd flow management for stadiums, powered by Google Gemini AI." />
    <meta name="theme-color" content="#020617" />
    <!-- Content Security Policy: restricts dangerous sources while allowing Gemini API + Google Fonts -->
    <meta http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-inline';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: https://api.dicebear.com;
        connect-src 'self' https://generativelanguage.googleapis.com;
        frame-ancestors 'none';
      "
    />
    <!-- Google Fonts: preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <title>FlowSync AI | Predictive Stadium Management</title>
  </head>

    >
